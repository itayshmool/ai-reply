<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #333;
    }

    .header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #6b2fa0, #4a1d70);
      color: white;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.85;
    }

    .content {
      padding: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #6b2fa0;
    }

    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    .hint a {
      color: #6b2fa0;
      text-decoration: none;
    }

    .platforms {
      margin-top: 14px;
      font-size: 12px;
      color: #888;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 16px;
      border: none;
      border-radius: 20px;
      background: #6b2fa0;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover {
      background: #4a1d70;
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .status--success {
      display: block;
      background: #f3e8ff;
      color: #6b2fa0;
    }

    .status--info {
      display: block;
      background: #fff3e0;
      color: #e65100;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI Reply</h1>
    <p>Rephrase replies with Claude AI</p>
  </div>
  <div class="content">
    <label for="apiKey">Claude API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." />
    <p class="hint">Get your key at <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></p>
    <p class="platforms">Works on LinkedIn and X (Twitter)</p>

    <button class="btn" id="saveBtn">Save Key</button>

    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
